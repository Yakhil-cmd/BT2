name: 7 Run Scanner Automation

on:
  workflow_dispatch:
    inputs:
      continue_batches:
        description: Trigger the next scanner batch automatically while work remains.
        required: true
        default: false
        type: boolean
      max_batches:
        description: Maximum scanner runs for this manual start.
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      batch_index:
        description: Internal counter for continued runs. Leave as 1 when starting manually.
        required: true
        default: '1'

permissions:
  contents: write
  actions: write

concurrency:
  group: run-scanner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check for scanned files
        id: check_scanned
        run: |
          if find scanned -type f -name '*.md' -print -quit 2>/dev/null | grep -q .; then
            echo "has_scanned=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_scanned=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate pending scanned questions
        if: steps.check_scanned.outputs.has_scanned == 'true'
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: python run_generate_scanned_questions_pending.py

      - name: Commit generated pending questions
        if: steps.check_scanned.outputs.has_scanned == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .

          if git diff --staged --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi

          git commit -m "Auto-update scanned question batch"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Check for pending validation files
        id: check_pending
        run: |
          if find validated_questions_pending -type f -name '*.md' -print -quit 2>/dev/null | grep -q .; then
            echo "has_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner batch
        if: steps.check_pending.outputs.has_pending == 'true'
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: python run_scanner.py

      - name: Commit scanner results
        if: steps.check_pending.outputs.has_pending == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .

          if git diff --staged --quiet; then
            echo "No scanner changes to commit"
            exit 0
          fi

          git commit -m "Auto-update scanner results"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Check for more pending validation files
        id: check_more_pending
        if: steps.check_pending.outputs.has_pending == 'true'
        run: |
          if find validated_questions_pending -type f -name '*.md' -print -quit 2>/dev/null | grep -q .; then
            echo "has_more_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_more_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger next bounded scanner batch
        if: >-
          github.event.inputs.continue_batches == 'true' &&
          steps.check_more_pending.outputs.has_more_pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BATCH_INDEX: ${{ github.event.inputs.batch_index }}
          MAX_BATCHES: ${{ github.event.inputs.max_batches }}
        run: |
          set -euo pipefail

          case "$BATCH_INDEX" in
            ''|*[!0-9]*) echo "Invalid batch_index: $BATCH_INDEX"; exit 1 ;;
          esac

          case "$MAX_BATCHES" in
            1|2|3|4|5) ;;
            *) echo "Invalid max_batches: $MAX_BATCHES"; exit 1 ;;
          esac

          if [ "$BATCH_INDEX" -ge "$MAX_BATCHES" ]; then
            echo "Reached max_batches=$MAX_BATCHES. Not dispatching another run."
            exit 0
          fi

          next_batch=$((BATCH_INDEX + 1))
          cat > dispatch.json <<JSON
          {
            "ref": "main",
            "inputs": {
              "continue_batches": "true",
              "max_batches": "$MAX_BATCHES",
              "batch_index": "$next_batch"
            }
          }
          JSON

          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/7_run_scanner.yml/dispatches" \
            --data @dispatch.json
